name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches CMake project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cmake_version="$(sed -nE 's/^project\(robstride_driver VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt)"
          if [ "$tag_version" != "$cmake_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match CMake version $cmake_version" >&2
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md section found for $version" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md
