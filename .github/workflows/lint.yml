name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Keep the version in sync with .pre-commit-config.yaml.
      - name: Install clang-format
        run: pipx install clang-format==18.1.8

      - name: Check formatting
        run: >
          clang-format --dry-run --Werror
          src/*.cpp include/robstride_driver/*.hpp tests/*.cpp
          examples/*.cpp examples/*.hpp

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev
          pipx install clang-tidy==22.1.7

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: clang-tidy -p build --quiet src/*.cpp examples/*.cpp tests/*.cpp

  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Keep the version in sync with .pre-commit-config.yaml.
      - name: Install ruff
        run: pipx install ruff==0.15.20

      - name: Lint
        run: ruff check tools/

      - name: Check formatting
        run: ruff format --check tools/
